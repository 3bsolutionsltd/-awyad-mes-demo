<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        .sidebar {
            min-width: 280px;
            max-width: 280px;
            height: 100vh;
            transition: transform 0.3s ease, min-width 0.3s ease, max-width 0.3s ease;
            overflow: hidden;
            flex-shrink: 0;
        }
        .sidebar.collapsed {
            transform: translateX(-280px);
            min-width: 0;
            max-width: 0;
        }
        .sidebar-content {
            width: 280px;
        }
        #content-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        .toggle-btn {
            position: fixed;
            top: 15px;
            left: 295px;
            z-index: 1050;
            background-color: #212529;
            border: 1px solid #495057;
            color: white;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            transition: left 0.3s ease;
        }
        .toggle-btn:hover {
            background-color: #343a40;
        }
        .toggle-btn.collapsed {
            left: 15px;
        }
    </style>
</head>
<body>
    <!-- Toggle Button -->
    <button class="toggle-btn" id="sidebar-toggle" title="Toggle Sidebar">
        <i class="bi bi-list"></i>
    </button>

    <!-- Sidebar Navigation -->
    <div class="sidebar d-flex flex-column flex-shrink-0 p-3 text-white bg-dark">
        <div class="sidebar-content">
        <a href="/" class="d-flex align-items-center mb-3 mb-md-0 me-md-auto text-white text-decoration-none">
            <span class="fs-4">AWYAD MES</span>
        </a>
        <!-- User Info -->
        <div class="mb-3 p-2 bg-secondary bg-opacity-25 rounded" id="userInfo">
            <div class="d-flex align-items-center">
                <i class="bi bi-person-circle fs-4 me-2"></i>
                <div class="flex-grow-1">
                    <small class="d-block text-white-50">Logged in as</small>
                    <strong id="userName">Loading...</strong>
                </div>
            </div>
        </div>
        <hr>
        <ul class="nav nav-pills flex-column mb-auto">
            <li class="nav-item">
                <a href="#" class="nav-link text-white" id="nav-dashboard">
                    <i class="bi bi-speedometer2"></i> Dashboard
                </a>
            </li>
            <li data-permission="projects.read">
                <a href="#" class="nav-link text-white" id="nav-projects">
                    <i class="bi bi-folder"></i> Projects
                </a>
            </li>
            <li data-permission="indicators.read">
                <a href="#" class="nav-link text-white" id="nav-indicators">
                    <i class="bi bi-bar-chart"></i> Indicator Tracking (ITT)
                </a>
            </li>
            <li data-permission="activities.read">
                <a href="#" class="nav-link text-white" id="nav-activities">
                    <i class="bi bi-list-check"></i> Activity Tracking (ATT)
                </a>
            </li>
            <li data-permission="cases.read">
                <a href="#" class="nav-link text-white" id="nav-case-management">
                    <i class="bi bi-briefcase"></i> Case Management
                </a>
            </li>
            <li>
                <a href="#" class="nav-link text-white" id="nav-monthly-tracking">
                    <i class="bi bi-calendar3"></i> Monthly Tracking
                </a>
            </li>
            <li data-permission="activities.create">
                <a href="#" class="nav-link text-white" id="nav-new-activity-report">
                    <i class="bi bi-plus-circle"></i> New Activity Report
                </a>
            </li>
            <li>
                <a href="#" class="nav-link text-white" id="nav-demo-guide">
                    <i class="bi bi-book"></i> Demo Guide
                </a>
            </li>
            <li data-role="admin" style="display: none;">
                <a href="#" class="nav-link text-white" id="nav-users">
                    <i class="bi bi-people"></i> User Management
                </a>
            </li>
            <li class="mt-auto">
                <hr class="text-white-50">
                <a href="#" class="nav-link text-white" id="nav-profile">
                    <i class="bi bi-person"></i> Profile
                </a>
            </li>
            <li>
                <a href="#" class="nav-link text-white" id="nav-logout">
                    <i class="bi bi-box-arrow-right"></i> Logout
                </a>
            </li>
        </ul>
        </div>
    </div>

    <!-- Main Content Area -->
    <div id="content-area">
        
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
    
    <!-- Sidebar Toggle Script -->
    <script type="module">
        import { authManager } from './auth.js?v=4';
        window.authManager = authManager;
        document.addEventListener('DOMContentLoaded', function() {
            // Check authentication first
            if (!authManager.isAuthenticated()) {
                window.location.href = 'login.html';
                return;
            }

            // Display user info
            const user = authManager.getCurrentUser();
            const userNameEl = document.getElementById('userName');
            if (user && userNameEl) {
                userNameEl.textContent = authManager.getUserDisplayName();
            }

            // Apply permission-based visibility
            document.querySelectorAll('[data-permission]').forEach(element => {
                const requiredPermission = element.getAttribute('data-permission');
                if (!authManager.hasPermission(requiredPermission)) {
                    element.style.display = 'none';
                }
            });

            // Apply role-based visibility
            document.querySelectorAll('[data-role]').forEach(element => {
                const requiredRole = element.getAttribute('data-role');
                if (authManager.hasRole(requiredRole)) {
                    element.style.display = '';
                }
            });

            // Setup logout handler
            const logoutBtn = document.getElementById('nav-logout');
            if (logoutBtn) {
                logoutBtn.addEventListener('click', async function(e) {
                    e.preventDefault();
                    await authManager.logout();
                    window.location.href = 'login.html';
                });
            }

            // Sidebar toggle functionality
            const toggleBtn = document.getElementById('sidebar-toggle');
            const sidebar = document.querySelector('.sidebar');
            
            toggleBtn.addEventListener('click', function() {
                sidebar.classList.toggle('collapsed');
                toggleBtn.classList.toggle('collapsed');
            });

            // Navigation handlers
            const contentArea = document.getElementById('content-area');
            
            // Show loading
            function showLoading() {
                contentArea.innerHTML = `
                    <div class="d-flex justify-content-center align-items-center" style="min-height: 400px;">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">Loading...</span>
                        </div>
                    </div>
                `;
            }

            // Show error
            function showError(message) {
                contentArea.innerHTML = `
                    <div class="alert alert-danger" role="alert">
                        <h4 class="alert-heading">Error</h4>
                        <p>${message}</p>
                    </div>
                `;
            }

            // Simple navigation
            async function navigate(view) {
                showLoading();
                
                // Remove active class from all nav links
                document.querySelectorAll('.nav-link').forEach(link => {
                    link.classList.remove('active');
                });

                try {
                    switch(view) {
                        case 'dashboard':
                            document.getElementById('nav-dashboard').classList.add('active');
                            const dashData = await Promise.all([
                                authManager.authenticatedFetch('/api/v1/projects').then(r => r.json()),
                                authManager.authenticatedFetch('/api/v1/indicators').then(r => r.json()),
                                authManager.authenticatedFetch('/api/v1/activities').then(r => r.json()),
                                authManager.authenticatedFetch('/api/v1/cases').then(r => r.json()),
                                authManager.authenticatedFetch('/api/v1/dashboard').then(r => r.json())
                            ]);
                            
                            const dashProjects = dashData[0].data?.projects || [];
                            const dashIndicators = dashData[1].data?.indicators || [];
                            const dashActivities = dashData[2].data?.activities || [];
                            const dashCases = dashData[3].data?.cases || [];
                            const dashThematicAreas = dashData[4].data?.thematicAreas || [];
                            
                            // Calculate statistics
                            const activeProjects = dashProjects.filter(p => p.status === 'Active').length;
                            const indicatorsOnTrack = dashIndicators.filter(ind => {
                                const progress = (ind.achieved / ind.annual_target) * 100;
                                return progress >= 70;
                            }).length;
                            const dashCurrentMonth = new Date().getMonth();
                            const dashCurrentYear = new Date().getFullYear();
                            const activitiesThisMonth = dashActivities.filter(act => {
                                const actDate = new Date(act.date);
                                return actDate.getMonth() === dashCurrentMonth && actDate.getFullYear() === dashCurrentYear;
                            }).length;
                            const dashActiveCases = dashCases.filter(c => c.status === 'Open' || c.status === 'In Progress').length;
                            const totalBudget = dashProjects.reduce((sum, p) => sum + (p.budget || 0), 0);
                            const totalExpenditure = dashProjects.reduce((sum, p) => sum + (p.expenditure || 0), 0);
                            const avgBurnRate = totalBudget > 0 ? (totalExpenditure / totalBudget) * 100 : 0;
                            
                            // Group indicators by thematic area
                            const thematicAreasMap = {};
                            dashThematicAreas.forEach(ta => {
                                thematicAreasMap[ta.id] = {
                                    ...ta,
                                    indicators: [],
                                    projects: dashProjects.filter(p => p.thematic_area_id === ta.id)
                                };
                            });
                            dashIndicators.forEach(ind => {
                                if (thematicAreasMap[ind.thematic_area_id]) {
                                    thematicAreasMap[ind.thematic_area_id].indicators.push(ind);
                                }
                            });
                            
                            contentArea.innerHTML = `
                                <div class="container-fluid">
                                    <h1 class="mb-4">AWYAD M&E Dashboard</h1>
                                    
                                    <!-- Summary Cards Row -->
                                    <div class="row mb-4">
                                        <div class="col-md-3">
                                            <div class="card text-white bg-primary mb-3">
                                                <div class="card-body">
                                                    <h5 class="card-title">Active Projects</h5>
                                                    <p class="card-text display-4">${dashProjects.length}</p>
                                                    <small>of ${dashProjects.length} total</small>
                                                </div>
                                            </div>
                                        </div>
                                        <div class="col-md-3">
                                            <div class="card text-white bg-success mb-3">
                                                <div class="card-body">
                                                    <h5 class="card-title">Indicators On-Track</h5>
                                                    <p class="card-text display-4">${indicatorsOnTrack}</p>
                                                    <small>of ${dashIndicators.length} total</small>
                                                </div>
                                            </div>
                                        </div>
                                        <div class="col-md-3">
                                            <div class="card text-white bg-info mb-3">
                                                <div class="card-body">
                                                    <h5 class="card-title">Activities This Month</h5>
                                                    <p class="card-text display-4">${activitiesThisMonth}</p>
                                                    <small>Total: ${dashActivities.length}</small>
                                                </div>
                                            </div>
                                        </div>
                                        <div class="col-md-3">
                                            <div class="card text-white bg-warning mb-3">
                                                <div class="card-body">
                                                    <h5 class="card-title">Budget Burn Rate</h5>
                                                    <p class="card-text display-4">${avgBurnRate.toFixed(1)}%</p>
                                                    <small>$${totalExpenditure.toLocaleString()} / $${totalBudget.toLocaleString()}</small>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <!-- Thematic Areas Overview -->
                                    <div class="row mb-4">
                                        <div class="col-12">
                                            <div class="card">
                                                <div class="card-header">
                                                    <h3>Thematic Areas Overview</h3>
                                                </div>
                                                <div class="card-body">
                                                    <div class="row">
                                                        ${Object.values(thematicAreasMap).map(ta => {
                                                            const totalProgress = ta.indicators.reduce((sum, ind) => {
                                                                return sum + ((ind.achieved / ind.annual_target) * 100 || 0);
                                                            }, 0);
                                                            const avgProgress = ta.indicators.length > 0 ? totalProgress / ta.indicators.length : 0;
                                                            let progressColor = 'danger';
                                                            if (avgProgress >= 70) progressColor = 'success';
                                                            else if (avgProgress >= 40) progressColor = 'warning';
                                                            
                                                            return `
                                                                <div class="col-md-4 mb-3">
                                                                    <div class="card h-100">
                                                                        <div class="card-body">
                                                                            <h5 class="card-title">${ta.code || ta.name}</h5>
                                                                            <h6 class="card-subtitle mb-2 text-muted">${ta.name?.substring(0, 50)}...</h6>
                                                                            <p class="card-text small">${ta.description || ta.name}</p>
                                                                            <hr>
                                                                            <p class="mb-1"><strong>Projects:</strong> ${ta.projects.length}</p>
                                                                            <p class="mb-1"><strong>Indicators:</strong> ${ta.indicators.length}</p>
                                                                            <p class="mb-2"><strong>Overall Progress:</strong></p>
                                                                            <div class="progress" style="height: 25px;">
                                                                                <div class="progress-bar bg-${progressColor}" role="progressbar" style="width: ${Math.min(avgProgress, 100)}%">
                                                                                    ${avgProgress.toFixed(1)}%
                                                                                </div>
                                                                            </div>
                                                                        </div>
                                                                    </div>
                                                                </div>
                                                            `;
                                                        }).join('')}
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <!-- Results Framework Summary -->
                                    <div class="row">
                                        <div class="col-12">
                                            <div class="card">
                                                <div class="card-header">
                                                    <h3>Results Framework Summary</h3>
                                                </div>
                                                <div class="card-body">
                                                    <div class="table-responsive">
                                                        <table class="table table-hover">
                                                            <thead>
                                                                <tr>
                                                                    <th>Indicator</th>
                                                                    <th>Target</th>
                                                                    <th>Achieved</th>
                                                                    <th style="width: 30%;">Progress</th>
                                                                </tr>
                                                            </thead>
                                                            <tbody>
                                                                ${dashIndicators.map(ind => {
                                                                    const progress = (ind.achieved / ind.annual_target) * 100 || 0;
                                                                    let progressColor = 'danger';
                                                                    if (progress >= 70) progressColor = 'success';
                                                                    else if (progress >= 40) progressColor = 'warning';
                                                                    
                                                                    const thematicArea = dashThematicAreas.find(ta => ta.id === ind.thematic_area_id);
                                                                    
                                                                    return `
                                                                        <tr>
                                                                            <td>
                                                                                <span class="badge bg-secondary">${ind.indicator_code || 'N/A'}</span><br>
                                                                                <strong>${ind.name}</strong><br>
                                                                                <small class="text-muted">${thematicArea?.name?.substring(0, 50) || 'N/A'}...</small>
                                                                            </td>
                                                                            <td><strong>${ind.annual_target}</strong> ${ind.unit || 'Individuals'}</td>
                                                                            <td><strong>${ind.achieved}</strong> ${ind.unit || 'Individuals'}</td>
                                                                            <td>
                                                                                <div class="progress">
                                                                                    <div class="progress-bar bg-${progressColor}" role="progressbar" 
                                                                                         style="width: ${Math.min(progress, 100)}%" 
                                                                                         aria-valuenow="${progress}" aria-valuemin="0" aria-valuemax="100">
                                                                                        ${progress.toFixed(1)}%
                                                                                    </div>
                                                                                </div>
                                                                            </td>
                                                                        </tr>
                                                                    `;
                                                                }).join('')}
                                                            </tbody>
                                                        </table>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            `;
                            break;
                        case 'projects':
                            document.getElementById('nav-projects').classList.add('active');
                            const [projRes, projThematicRes] = await Promise.all([
                                authManager.authenticatedFetch('/api/v1/projects'),
                                authManager.authenticatedFetch('/api/v1/dashboard')
                            ]);
                            const projData = await projRes.json();
                            const projThematicData = await projThematicRes.json();
                            const projects = projData.data?.projects || [];
                            const projectThematicAreas = projThematicData.data?.thematicAreas || [];
                            
                            contentArea.innerHTML = `
                                <div class="container-fluid">
                                    <h1 class="mb-4">Projects</h1>
                                    
                                    <div class="card">
                                        <div class="card-body">
                                            <div class="table-responsive">
                                                <table class="table table-hover">
                                                    <thead>
                                                        <tr>
                                                            <th>Project Name</th>
                                                            <th>Thematic Area</th>
                                                            <th>Donor</th>
                                                            <th>Status</th>
                                                            <th style="width: 20%;">Budget Burn Rate</th>
                                                        </tr>
                                                    </thead>
                                                    <tbody>
                                                        ${projects.length ? projects.map(p => {
                                                            const thematicArea = projectThematicAreas.find(ta => ta.id === p.thematic_area_id);
                                                            const burnRate = p.budget > 0 ? ((p.expenditure || 0) / p.budget * 100) : 0;
                                                            let burnRateColor = 'success';
                                                            if (burnRate >= 80) burnRateColor = 'danger';
                                                            else if (burnRate >= 60) burnRateColor = 'warning';
                                                            
                                                            return `
                                                                <tr>
                                                                    <td>
                                                                        <strong>${p.name}</strong><br>
                                                                        <small class="text-muted">${p.code || 'N/A'}</small>
                                                                    </td>
                                                                    <td>${thematicArea?.name?.substring(0, 60) || 'N/A'}...</td>
                                                                    <td>${p.donor || 'N/A'}</td>
                                                                    <td>
                                                                        <span class="badge bg-${p.status === 'Active' ? 'success' : 'secondary'}">${p.status}</span>
                                                                    </td>
                                                                    <td>
                                                                        <div class="progress">
                                                                            <div class="progress-bar bg-${burnRateColor}" role="progressbar" 
                                                                                 style="width: ${burnRate}%" 
                                                                                 aria-valuenow="${burnRate}" aria-valuemin="0" aria-valuemax="100">
                                                                                ${burnRate.toFixed(1)}%
                                                                            </div>
                                                                        </div>
                                                                    </td>
                                                                </tr>
                                                            `;
                                                        }).join('') : '<tr><td colspan="5" class="text-center">No projects found</td></tr>'}
                                                    </tbody>
                                                </table>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            `;
                            break;
                        case 'indicators':
                            document.getElementById('nav-indicators').classList.add('active');
                            const [indRes, indThematicRes, indProjectsRes] = await Promise.all([
                                authManager.authenticatedFetch('/api/v1/indicators'),
                                authManager.authenticatedFetch('/api/v1/dashboard'),
                                authManager.authenticatedFetch('/api/v1/projects')
                            ]);
                            const indData = await indRes.json();
                            const indThematicData = await indThematicRes.json();
                            const indProjectsData = await indProjectsRes.json();
                            const indicators = indData.data?.indicators || [];
                            const indicatorThematicAreas = indThematicData.data?.thematicAreas || [];
                            const indicatorProjects = indProjectsData.data?.projects || [];
                            
                            // Group indicators by thematic area
                            const indicatorsByThematicArea = {};
                            indicatorThematicAreas.forEach(ta => {
                                indicatorsByThematicArea[ta.id] = {
                                    ...ta,
                                    indicators: []
                                };
                            });
                            indicators.forEach(ind => {
                                if (indicatorsByThematicArea[ind.thematic_area_id]) {
                                    indicatorsByThematicArea[ind.thematic_area_id].indicators.push(ind);
                                }
                            });
                            
                            contentArea.innerHTML = `
                                <div class="container-fluid">
                                    <div class="d-flex justify-content-between align-items-center mb-4">
                                        <h1>Indicator Tracking Table (ITT)</h1>
                                        <button class="btn btn-success" id="export-indicators-btn">
                                            <i class="bi bi-file-earmark-excel"></i> Export to CSV
                                        </button>
                                    </div>
                                    
                                    ${Object.values(indicatorsByThematicArea).map(ta => `
                                        <div class="card mb-4">
                                            <div class="card-header bg-primary text-white">
                                                <h3 class="mb-0">${ta.code || ta.name}</h3>
                                                <p class="mb-0 small">${ta.description || ta.name}</p>
                                            </div>
                                            <div class="card-body">
                                                <div class="table-responsive">
                                                    <table class="table table-bordered table-hover">
                                                        <thead class="table-light">
                                                            <tr>
                                                                <th rowspan="2">Code</th>
                                                                <th rowspan="2">Indicator</th>
                                                                <th rowspan="2">Type</th>
                                                                <th colspan="2">Baseline</th>
                                                                <th rowspan="2">LOP Target</th>
                                                                <th rowspan="2">Annual Target</th>
                                                                <th rowspan="2">Achieved</th>
                                                                <th rowspan="2">Variance</th>
                                                                <th rowspan="2">% Achieved</th>
                                                            </tr>
                                                            <tr>
                                                                <th>Value</th>
                                                                <th>Date</th>
                                                            </tr>
                                                        </thead>
                                                        <tbody>
                                                            ${ta.indicators.map(ind => {
                                                                const project = indicatorProjects.find(p => p.id === ind.project_id);
                                                                const progress = ind.annual_target > 0 ? (ind.achieved / ind.annual_target * 100) : 0;
                                                                const variance = ind.achieved - ind.annual_target;
                                                                let progressColor = 'danger';
                                                                let badgeColor = 'danger';
                                                                if (progress >= 70) {
                                                                    progressColor = 'success';
                                                                    badgeColor = 'success';
                                                                } else if (progress >= 40) {
                                                                    progressColor = 'warning';
                                                                    badgeColor = 'warning';
                                                                }
                                                                
                                                                return `
                                                                    <tr>
                                                                        <td><span class="badge bg-secondary">${ind.indicator_code || 'N/A'}</span></td>
                                                                        <td>
                                                                            <strong>${ind.name}</strong><br>
                                                                            <small class="text-muted">Project: ${project?.name || 'N/A'}</small><br>
                                                                            <small class="text-muted">Unit: ${ind.unit || 'Individuals'}</small>
                                                                        </td>
                                                                        <td><span class="badge bg-info">${ind.type || 'Outcome'}</span></td>
                                                                        <td>${ind.baseline_value || 0}</td>
                                                                        <td><small>${ind.baseline_date ? new Date(ind.baseline_date).toISOString().split('T')[0] : '2024-01-01'}</small></td>
                                                                        <td><strong>${ind.lop_target || ind.annual_target}</strong></td>
                                                                        <td><strong>${ind.annual_target}</strong></td>
                                                                        <td><span class="badge bg-${badgeColor}">${ind.achieved}</span></td>
                                                                        <td>${variance}</td>
                                                                        <td>
                                                                            <div class="progress" style="height: 25px;">
                                                                                <div class="progress-bar bg-${progressColor}" role="progressbar" 
                                                                                     style="width: ${Math.min(progress, 100)}%" 
                                                                                     aria-valuenow="${progress}" aria-valuemin="0" aria-valuemax="100">
                                                                                    ${progress.toFixed(1)}%
                                                                                </div>
                                                                            </div>
                                                                        </td>
                                                                    </tr>
                                                                `;
                                                            }).join('')}
                                                        </tbody>
                                                    </table>
                                                </div>
                                            </div>
                                        </div>
                                    `).join('')}
                                    
                                    <!-- Quarterly Breakdown -->
                                    <div class="card">
                                        <div class="card-header">

                            const formIndicators = formIndData.data?.indicators || [];
                            
                            const projectSelect = document.getElementById('form-project');
                            formProjects.forEach(p => {
                                const option = document.createElement('option');
                                option.value = p.id;
                                option.textContent = p.name;
                                projectSelect.appendChild(option);
                            });
                            
                            const indicatorSelect = document.getElementById('form-indicator');
                            formIndicators.forEach(ind => {
                                const option = document.createElement('option');
                                option.value = ind.id;
                                option.textContent = `${ind.indicator_code} - ${ind.indicator_name}`;
                                indicatorSelect.appendChild(option);
                            });
                            
                            // Auto-calculation for refugee beneficiaries
                            const refugeeInputs = document.querySelectorAll('.refugee-input');
                            refugeeInputs.forEach(input => {
                                input.addEventListener('input', () => {
                                    // Calculate subtotals for each age group
                                    ['0-4', '5-17', '18-49', '50'].forEach(age => {
                                        const male = parseInt(document.getElementById(`ref-m-${age}`).value) || 0;
                                        const female = parseInt(document.getElementById(`ref-f-${age}`).value) || 0;
                                        document.getElementById(`ref-sub-${age}`).textContent = male + female;
                                    });
                                    
                                    // Calculate column totals
                                    let refMaleTotal = 0, refFemaleTotal = 0;
                                    ['0-4', '5-17', '18-49', '50'].forEach(age => {
                                        refMaleTotal += parseInt(document.getElementById(`ref-m-${age}`).value) || 0;
                                        refFemaleTotal += parseInt(document.getElementById(`ref-f-${age}`).value) || 0;
                                    });
                                    document.getElementById('ref-male-total').textContent = refMaleTotal;
                                    document.getElementById('ref-female-total').textContent = refFemaleTotal;
                                    document.getElementById('ref-total').textContent = refMaleTotal + refFemaleTotal;
                                    
                                    // Update grand total
                                    const hostTotal = parseInt(document.getElementById('host-total').textContent) || 0;
                                    document.getElementById('grand-total').textContent = (refMaleTotal + refFemaleTotal + hostTotal);
                                    
                                    // Update nationality expected
                                    document.getElementById('nat-expected').textContent = refMaleTotal + refFemaleTotal;
                                    checkNationalityMatch();
                                });
                            });
                            
                            // Auto-calculation for host beneficiaries
                            const hostInputs = document.querySelectorAll('.host-input');
                            hostInputs.forEach(input => {
                                input.addEventListener('input', () => {
                                    // Calculate subtotals for each age group
                                    ['0-4', '5-17', '18-49', '50'].forEach(age => {
                                        const male = parseInt(document.getElementById(`host-m-${age}`).value) || 0;
                                        const female = parseInt(document.getElementById(`host-f-${age}`).value) || 0;
                                        document.getElementById(`host-sub-${age}`).textContent = male + female;
                                    });
                                    
                                    // Calculate column totals
                                    let hostMaleTotal = 0, hostFemaleTotal = 0;
                                    ['0-4', '5-17', '18-49', '50'].forEach(age => {
                                        hostMaleTotal += parseInt(document.getElementById(`host-m-${age}`).value) || 0;
                                        hostFemaleTotal += parseInt(document.getElementById(`host-f-${age}`).value) || 0;
                                    });
                                    document.getElementById('host-male-total').textContent = hostMaleTotal;
                                    document.getElementById('host-female-total').textContent = hostFemaleTotal;
                                    document.getElementById('host-total').textContent = hostMaleTotal + hostFemaleTotal;
                                    
                                    // Update grand total
                                    const refTotal = parseInt(document.getElementById('ref-total').textContent) || 0;
                                    document.getElementById('grand-total').textContent = (refTotal + hostMaleTotal + hostFemaleTotal);
                                });
                            });
                            
                            // Nationality validation
                            const nationalityInputs = document.querySelectorAll('.nationality-input');
                            nationalityInputs.forEach(input => {
                                input.addEventListener('input', checkNationalityMatch);
                            });
                            
                            function checkNationalityMatch() {
                                const sudanese = parseInt(document.getElementById('nat-sudanese').value) || 0;
                                const congolese = parseInt(document.getElementById('nat-congolese').value) || 0;
                                const southSudanese = parseInt(document.getElementById('nat-south-sudanese').value) || 0;
                                const others = parseInt(document.getElementById('nat-others').value) || 0;
                                const natSum = sudanese + congolese + southSudanese + others;
                                
                                const refTotal = parseInt(document.getElementById('ref-total').textContent) || 0;
                                
                                document.getElementById('nat-sum').textContent = natSum;
                                const alert = document.getElementById('nationality-alert');
                                
                                if (natSum !== refTotal && refTotal > 0) {
                                    alert.classList.remove('d-none');
                                } else {
                                    alert.classList.add('d-none');
                                }
                            }
                            
                            // Reset form button
                            document.getElementById('reset-form-btn').addEventListener('click', () => {
                                document.getElementById('activity-form').reset();
                                // Reset all calculated fields
                                refugeeInputs.forEach(input => input.value = 0);
                                hostInputs.forEach(input => input.value = 0);
                                nationalityInputs.forEach(input => input.value = 0);
                                refugeeInputs[0].dispatchEvent(new Event('input'));
                                hostInputs[0].dispatchEvent(new Event('input'));
                            });
                            
                            // Form submission (save draft or submit)
                            document.getElementById('save-draft-btn').addEventListener('click', () => {
                                alert('Draft saved successfully! (API integration pending)');
                            });
                            
                            document.getElementById('activity-form').addEventListener('submit', (e) => {
                                e.preventDefault();
                                alert('Activity submitted for review! (API integration pending)');
                            });
                            
                            break;
                        case 'demo-guide':
                            document.getElementById('nav-demo-guide').classList.add('active');
                            contentArea.innerHTML = `
                                <div class="container-fluid">
                                    <h2><i class="bi bi-book"></i> Demo Guide</h2>
                                    <div class="card mt-3">
                                        <div class="card-body">
                                            <h5>Welcome to AWYAD MES</h5>
                                            <p>This is a comprehensive Monitoring, Evaluation, and Learning (MEL) system for managing projects, tracking indicators, and monitoring activities.</p>
                                            <h6 class="mt-3">Key Features:</h6>
                                            <ul>
                                                <li><strong>Dashboard:</strong> Overview of projects, indicators, and activities</li>
                                                <li><strong>Projects:</strong> Manage project information, budgets, and timelines</li>
                                                <li><strong>Indicator Tracking:</strong> Track key performance indicators</li>
                                                <li><strong>Activity Tracking:</strong> Monitor activities with beneficiary data</li>
                                                <li><strong>Case Management:</strong> Track and manage individual cases</li>
                                                <li><strong>User Management:</strong> Admin-only feature to manage users and permissions</li>
                                            </ul>
                                        </div>
                                    </div>
                                </div>
                            `;
                            break;
                        case 'users':
                            document.getElementById('nav-users').classList.add('active');
                            // Check if user has admin role
                            if (!authManager.hasRole('admin')) {
                                contentArea.innerHTML = `
                                    <div class="container-fluid">
                                        <div class="alert alert-danger mt-3">
                                            <i class="bi bi-exclamation-triangle"></i> Access Denied. Admin privileges required.
                                        </div>
                                    </div>
                                `;
                                break;
                            }
                            const usersResponse = await authManager.authenticatedFetch('/api/v1/users');
                            const usersData = await usersResponse.json();
                            contentArea.innerHTML = `
                                <div class="container-fluid">
                                    <h2><i class="bi bi-people"></i> User Management</h2>
                                    <div class="table-responsive mt-3">
                                        <table class="table table-striped table-hover">
                                            <thead>
                                                <tr>
                                                    <th>Name</th>
                                                    <th>Email</th>
                                                    <th>Username</th>
                                                    <th>Status</th>
                                                    <th>Roles</th>
                                                    <th>Actions</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                ${usersData.data?.users?.map(user => `
                                                    <tr>
                                                        <td>${user.first_name} ${user.last_name}</td>
                                                        <td>${user.email}</td>
                                                        <td>${user.username}</td>
                                                        <td><span class="badge ${user.is_active ? 'bg-success' : 'bg-danger'}">${user.is_active ? 'Active' : 'Inactive'}</span></td>
                                                        <td>${user.roles?.map(r => r.display_name || r.name).join(', ') || 'None'}</td>
                                                        <td>
                                                            <button class="btn btn-sm btn-primary" onclick="alert('Edit user feature coming soon')">
                                                                <i class="bi bi-pencil"></i>
                                                            </button>
                                                        </td>
                                                    </tr>
                                                `).join('') || '<tr><td colspan="6" class="text-center">No users found</td></tr>'}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            `;
                            break;
                        default:
                            contentArea.innerHTML = '<div class="container-fluid"><h2>Welcome to AWYAD MES</h2><p>Select an option from the menu.</p></div>';
                    }
                } catch (error) {
                    console.error('Navigation error:', error);
                    showError(error.message || 'Failed to load data');
                }
            }

            // Attach navigation handlers
            document.getElementById('nav-dashboard')?.addEventListener('click', (e) => { e.preventDefault(); navigate('dashboard'); });
            document.getElementById('nav-projects')?.addEventListener('click', (e) => { e.preventDefault(); navigate('projects'); });
            document.getElementById('nav-indicators')?.addEventListener('click', (e) => { e.preventDefault(); navigate('indicators'); });
            document.getElementById('nav-activities')?.addEventListener('click', (e) => { e.preventDefault(); navigate('activities'); });
            document.getElementById('nav-case-management')?.addEventListener('click', (e) => { e.preventDefault(); navigate('cases'); });
            document.getElementById('nav-monthly-tracking')?.addEventListener('click', (e) => { e.preventDefault(); navigate('monthly-tracking'); });
            document.getElementById('nav-new-activity-report')?.addEventListener('click', (e) => { e.preventDefault(); navigate('new-activity-report'); });
            document.getElementById('nav-demo-guide')?.addEventListener('click', (e) => { e.preventDefault(); navigate('demo-guide'); });
            document.getElementById('nav-users')?.addEventListener('click', (e) => { e.preventDefault(); navigate('users'); });
            document.getElementById('nav-profile')?.addEventListener('click', (e) => { e.preventDefault(); window.location.href = 'profile.html'; });

            // Load dashboard by default
            navigate('dashboard');
        });
    </script>
</body>
</html>
