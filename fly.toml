# fly.toml - Fly.io configuration for AWYAD MES
# Change the app name below if "awyad-mes" is already taken
app = "awyad-mes"
primary_region = "lhr"

[build]

[env]
  NODE_ENV = "production"
  PORT = "3000"
  USE_DATABASE = "false"
  LOG_LEVEL = "info"
  API_BASE_URL = "/api/v1"
  RATE_LIMIT_WINDOW_MS = "900000"
  RATE_LIMIT_MAX_REQUESTS = "200"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/api/v1/health"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
